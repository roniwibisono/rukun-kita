name: rukun_kita
description: "Rukun Kita - Aplikasi pembukuan & persuratan digital RT"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.6.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Env
  flutter_dotenv: ^5.1.0

  # Forms & UI
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.0.0
  fl_chart: ^0.68.0
  intl: ^0.20.2

  # Local notification
  flutter_local_notifications: ^17.2.2

  # Utility
  equatable: ^2.0.5
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
